# ---------------------------------------------------------------------------
# Site settings
# ---------------------------------------------------------------------------
locale: "en-US"
title: "isatope.dev"
title_separator: "-"
name: "Isabella Garcia"
description: "Bioinformatics // Multi-omics, NGS pipelines, and computational biology"
url: "https://isatope.dev"
repository: izarus-rots/isatope-site
logo:

# ---------------------------------------------------------------------------
# Theme — loaded remotely, no forking required
# ---------------------------------------------------------------------------
theme: null
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default" # try "dirt", "neon", "contrast", or "mint" any time — one-line change

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# ---------------------------------------------------------------------------
# Author sidebar (shows on every page)
# ---------------------------------------------------------------------------
author:
  name: "Isabella (Isa) Garcia"
  avatar: "/assets/files/GtechHEadshots-010-3.jpg"
  bio: "UC San Diego, B.S. Bioengineering: Bioinformatics '26"
  location: "San Diego, CA"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/izarus-rots"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/isabella-v-g/"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:isabella.v.garcia2004@gmail.com"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/izarus-rots/isatope-site"

# ---------------------------------------------------------------------------
# Default layout for every page (Minimal Mistakes convention)
# ---------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true

# ---------------------------------------------------------------------------
# Build settings
# ---------------------------------------------------------------------------
markdown: kramdown
include:
  - _pages
exclude:
  - README.md
